name: Commit Tracker Smoke Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Show trigger details
        run: |
          echo "Workflow triggered successfully"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"